<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <title>Blocked - Scroll Stopper</title>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center text-gray-800">

  <!-- Deep focus block -->
  <div id="deep-focus-view" class="text-center px-6 hidden">
    <div class="text-5xl mb-6">🔒</div>
    <h1 class="text-2xl font-bold mb-3">Deep Focus Active</h1>
    <p class="text-gray-500 max-w-sm">
      This site is blocked while deep focus mode is on. Turn it off from the Scroll Stopper extension to continue.
    </p>
  </div>

  <!-- Distraction warning -->
  <div id="distraction-view" class="text-center px-6 hidden">
    <div class="text-5xl mb-6">🤔</div>
    <h1 class="text-2xl font-bold mb-3">Are you sure this is important right now?</h1>
    <p id="blocked-url" class="text-gray-400 text-sm mb-6 break-all"></p>
    <button id="continue-btn"
      class="px-6 py-2.5 bg-gray-200 text-gray-700 text-sm font-medium rounded-lg hover:bg-gray-300 transition-colors">
      Yes, continue to distracting site
    </button>
  </div>

  <script src="blocked.js"></script>
</body>
</html>
