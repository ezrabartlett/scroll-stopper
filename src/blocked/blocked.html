<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <title>Blocked - Scroll Stopper</title>
</head>
<body class="min-h-screen bg-surface flex items-center justify-center text-txt">

  <!-- Deep focus block -->
  <div id="deep-focus-view" class="text-center px-6 hidden">
    <div class="text-5xl mb-6">🔒</div>
    <h1 class="text-2xl font-bold mb-3">Deep Focus Active</h1>
    <p class="text-txt-secondary max-w-sm">
      This site is blocked while deep focus mode is on. Turn it off from the Scroll Stopper extension to continue.
    </p>
  </div>

  <!-- Distraction warning -->
  <div id="distraction-view" class="text-center px-6 hidden">
    <div class="text-5xl mb-6">🤔</div>
    <h1 class="text-2xl font-bold mb-3">Are you sure this is important right now?</h1>
    <p id="blocked-url" class="text-txt-muted text-sm mb-6 break-all"></p>
    <button id="continue-btn" disabled
      class="relative px-6 py-2.5 bg-btn-neutral text-sm font-medium rounded-lg overflow-hidden transition-colors disabled:cursor-not-allowed disabled:text-disabled-text text-btn-neutral-text">
      <div id="btn-fill" class="absolute inset-0 bg-btn-neutral-fill origin-left transition-none"></div>
      <span class="relative z-10">Yes, continue to distracting site</span>
    </button>
  </div>

  <script src="blocked.js"></script>
</body>
</html>
