<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <title>Scroll Stopper</title>
</head>
<body class="w-80 bg-gray-50 text-gray-800">
  <div class="p-5 max-h-[500px] overflow-y-auto">
    <h1 class="text-lg font-semibold text-center mb-4">Scroll Stopper</h1>

    <!-- Deep focus toggle -->
    <div class="flex items-center justify-between py-3 border-b border-gray-200">
      <span class="text-sm font-medium">Deep focus mode</span>
      <label class="relative inline-flex items-center cursor-pointer">
        <input id="focus-toggle" type="checkbox" class="sr-only peer">
        <div class="w-9 h-5 bg-gray-300 rounded-full peer peer-checked:bg-blue-500 after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:after:translate-x-full"></div>
      </label>
    </div>

    <!-- Distraction sites -->
    <div class="py-3 border-b border-gray-200">
      <div class="flex items-center justify-between mb-2">
        <span class="text-sm font-medium">Distraction sites</span>
      </div>
      <ul id="distraction-list" class="space-y-1.5 mb-2"></ul>
      <p id="distraction-empty" class="text-xs text-gray-400 mb-2 hidden">No sites added.</p>
      <div id="distraction-add-row" class="flex gap-2 hidden">
        <input id="distraction-input" type="text" placeholder="e.g. reddit.com"
          class="flex-1 border border-gray-300 rounded px-2 py-1 text-xs focus:outline-none focus:ring-1 focus:ring-blue-500">
        <button id="distraction-confirm" class="text-xs text-blue-500 hover:text-blue-700 font-medium">Add</button>
        <button id="distraction-cancel" class="text-xs text-gray-400 hover:text-gray-600">Cancel</button>
      </div>
      <button id="distraction-add-btn" class="text-xs text-blue-500 hover:text-blue-700 font-medium">+ Add</button>
    </div>

    <!-- Allowed during deep focus -->
    <div class="py-3">
      <div class="flex items-center justify-between mb-2">
        <span class="text-sm font-medium">Allowed during deep focus</span>
      </div>
      <ul id="allowed-list" class="space-y-1.5 mb-2"></ul>
      <p id="allowed-empty" class="text-xs text-gray-400 mb-2 hidden">No sites added.</p>
      <div id="allowed-add-row" class="flex gap-2 hidden">
        <input id="allowed-input" type="text" placeholder="e.g. docs.google.com"
          class="flex-1 border border-gray-300 rounded px-2 py-1 text-xs focus:outline-none focus:ring-1 focus:ring-blue-500">
        <button id="allowed-confirm" class="text-xs text-blue-500 hover:text-blue-700 font-medium">Add</button>
        <button id="allowed-cancel" class="text-xs text-gray-400 hover:text-gray-600">Cancel</button>
      </div>
      <button id="allowed-add-btn" class="text-xs text-blue-500 hover:text-blue-700 font-medium">+ Add</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
